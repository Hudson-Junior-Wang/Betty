<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#073f34" />
    <meta
      name="description"
      content="楚雄东润矿业综合管理系统 Web 前端演示版"
    />
    <title>楚雄东润矿业综合管理系统</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="系统主导航">
        <div class="brand">
          <span class="brand-mark">东润</span>
          <div>
            <strong>楚雄东润矿业</strong>
            <small>综合管理系统</small>
          </div>
        </div>

        <nav id="mainNav"></nav>

        <div class="contour-lines" aria-hidden="true">
          <i></i><i></i><i></i><i></i>
        </div>
        <div class="sidebar-footer">
          <span class="system-dot"></span>前端演示环境
        </div>
      </aside>

      <button
        class="sidebar-backdrop"
        id="sidebarBackdrop"
        aria-label="关闭导航"
        hidden
      ></button>

      <section class="workspace">
        <header class="topbar">
          <div class="topbar-title">
            <button class="icon-button mobile-menu" id="mobileMenu" aria-label="打开导航">
              <span class="line-icon">☰</span>
            </button>
            <div>
              <p id="pageEyebrow">综合管理</p>
              <h1 id="pageTitle">工作台</h1>
            </div>
            <span class="demo-badge">WEB 前端演示版</span>
          </div>

          <div class="topbar-tools">
            <span class="date" id="todayLabel"></span>
            <button class="icon-button" id="globalSearchButton" aria-label="搜索">
              <span class="line-icon">⌕</span>
            </button>
            <button class="icon-button notification" id="notificationButton" aria-label="消息提醒">
              <span class="line-icon">♢</span><b>3</b>
            </button>
            <div class="user-block">
              <span>管</span>
              <div><strong>系统管理员</strong><small>内部试用账户</small></div>
            </div>
            <button class="primary-button" id="quickAddButton">
              <span>＋</span>快速新增
            </button>
          </div>
        </header>

        <main class="content-area" id="appContent" tabindex="-1">
          <section class="loading-state" aria-live="polite">
            <span></span>
            <p>正在载入管理工作台…</p>
          </section>
        </main>
      </section>
    </div>

    <div class="drawer" id="noticeDrawer" aria-hidden="true">
      <div class="drawer-heading">
        <div><small>消息中心</small><h2>待处理提醒</h2></div>
        <button class="icon-button" data-close-drawer aria-label="关闭">×</button>
      </div>
      <div class="notice-list" id="noticeList"></div>
    </div>

    <div class="modal-backdrop" id="recordModal" hidden>
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-heading">
          <div><p id="modalEyebrow">台账记录</p><h2 id="modalTitle">新增记录</h2></div>
          <button class="icon-button" data-close-modal aria-label="关闭">×</button>
        </div>
        <form id="recordForm">
          <input type="hidden" id="recordId" />
          <div class="form-grid">
            <label class="form-field">
              <span id="codeLabel">编号</span>
              <input id="recordCode" autocomplete="off" placeholder="自动或手工编号" />
            </label>
            <label class="form-field">
              <span id="titleLabel">事项名称<b>*</b></span>
              <input id="recordTitle" autocomplete="off" required placeholder="请输入事项名称" />
            </label>
            <label class="form-field">
              <span>责任部门</span>
              <select id="recordDepartment"></select>
            </label>
            <label class="form-field">
              <span id="ownerLabel">负责人</span>
              <input id="recordOwner" autocomplete="off" placeholder="填写责任人" />
            </label>
            <label class="form-field">
              <span>办理状态</span>
              <select id="recordStatus">
                <option>待审核</option>
                <option>进行中</option>
                <option>已完成</option>
                <option>已归档</option>
                <option>已逾期</option>
              </select>
            </label>
            <label class="form-field">
              <span id="dateLabel">截止日期</span>
              <input id="recordDate" type="date" />
            </label>
            <label class="form-field wide">
              <span id="notesLabel">备注</span>
              <textarea id="recordNotes" rows="4" placeholder="填写办理情况、注意事项或补充说明"></textarea>
            </label>
          </div>
          <div class="modal-actions">
            <button type="button" class="secondary-button" data-close-modal>取消</button>
            <button type="submit" class="primary-button">保存记录</button>
          </div>
        </form>
      </section>
    </div>

    <div class="modal-backdrop" id="searchModal" hidden>
      <section class="modal-card search-card" role="dialog" aria-modal="true" aria-labelledby="searchTitle">
        <div class="modal-heading">
          <div><p>全局检索</p><h2 id="searchTitle">搜索全部台账</h2></div>
          <button class="icon-button" data-close-search aria-label="关闭">×</button>
        </div>
        <div class="global-search-body">
          <label class="search-box large">
            <span>⌕</span>
            <input id="globalSearchInput" placeholder="输入事项、编号、部门或负责人" />
          </label>
          <div id="globalSearchResults" class="global-search-results"></div>
        </div>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <noscript>本系统需要启用 JavaScript 才能使用。</noscript>
    <script src="app.js" defer></script>
  </body>
</html>
